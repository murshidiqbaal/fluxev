name: flux_ev
description: FluxEV – Kerala EV Charging Discovery Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.3.4

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # Navigation
  go_router: ^13.2.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0

  # QR Scanner
  mobile_scanner: ^5.1.1

  # UI Animations
  flutter_animate: ^4.5.2
  lottie: ^3.1.0

  # Fonts & Styling
  google_fonts: ^8.0.2

  # Utilities
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  uuid: ^4.4.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  logger: ^2.3.0

  cupertino_icons: ^1.0.6
  flutter_launcher_icons: ^0.14.4
  table_calendar: ^3.1.3
  glassmorphism: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  riverpod_generator: ^2.3.9

#flutter_launcher_icons
flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/appicon/fluxev.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
    - assets/appicon/
